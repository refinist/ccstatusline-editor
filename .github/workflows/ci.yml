name: CI

# Gate for the main trunk: direct pushes and PRs both run the full check
# suite. Deploys are NOT tied to main — pushing a `v*` version tag (via
# `pnpm release` / bumpp) is what triggers deploy.yml.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (includes type check)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
