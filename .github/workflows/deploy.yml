name: Deploy

# Deploys are cut from version tags, not branches: main is the everyday trunk
# (gated by ci.yml), and releasing = `pnpm release` (bumpp), which bumps
# package.json, commits, tags vX.Y.Z-ccse.N and pushes — the pushed tag lands
# here. The build/lint/test steps below still run before the deploy step as a
# last line of defense, so a bad tag can't ship.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

# contents: write (bumped from read) so the changelog step below can
# create/update the GitHub Release for the pushed tag.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — changelogithub needs the full tag history to diff
      # the pushed tag against the previous one.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # --no-prerelease: every tag here carries a `-ccse.N` semver prerelease
      # identifier by design (see the `release` script), so changelogithub's
      # own semver check would otherwise flag every single release as a
      # GitHub "Pre-release" forever. These are still real, final releases —
      # the suffix is just our own build counter, not a semver prerelease.
      - name: Generate GitHub Changelog
        run: pnpx changelogithub --no-prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (includes type check)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Not `pnpm deploy` (a pnpm built-in that would shadow any script) and
      # not `worker:deploy` (which would rebuild — the Build step above
      # already produced dist/): just upload what was built and verified.
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
