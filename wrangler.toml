name = "ccstatusline-editor"
main = "worker/index.ts"
compatibility_date = "2024-11-01"

# Custom domain (requires the refineup.com zone to live in this Cloudflare
# account): wrangler provisions the DNS record + certificate on first deploy.
routes = [{ pattern = "ccse.refineup.com", custom_domain = true }]

[assets]
directory = "dist"
# SPA fallback: any path that doesn't match a built static file serves index.html,
# so client-side routes (e.g. /templates) survive a hard refresh.
not_found_handling = "single-page-application"
# Only /api/* is routed to the Worker above; everything else is served straight
# off `assets` (including the SPA fallback) without invoking worker/index.ts at all.
run_worker_first = ["/api/*"]

# Created with: pnpm exec wrangler kv namespace create SHARES
# Then paste the returned `id` (and, for local/preview testing, a
# `pnpm exec wrangler kv namespace create SHARES --preview` id as `preview_id`) below.
[[kv_namespaces]]
binding = "SHARES"
id = "3c5b7e59b635426c996c1bc64af28083"
preview_id = "e083dcc57b7640a080755f2a0d34686b"
